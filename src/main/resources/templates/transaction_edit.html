<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <title>編集</title>
</head>

<body>
  <h1>編集</h1>
  <div class="container mt-5">
    <div class="container-box">
      <form th:action="@{/transactions/{id}/edit(id=${transaction.id})}" th:object="${transaction}" method="post">
        <div class="mb-3">
          <label class="form-label">日付</label>
          <input type="date" name="transactionDate" th:value="${#temporals.format(transaction.transactionDate, 'yyyy-MM-dd')}"
            class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">種類</label>
          <select th:field="*{incomeexpensecd}" class="form-control">
            <option value="">選択してください</option>
            <option value="INCOME">収入</option>
            <option value="EXPENSE">支出</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">名前</label>
          <input type="text" th:field="*{name}" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">金額</label>
          <input type="number" th:field="*{amount}" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">メモ</label>
          <input type="text" th:field="*{memo}" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">更新</button>
      </form>
    </div>
  </div>
  <p><a href="/transactions">一覧へ戻る</a></p>
</body>

</html>
