<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <title>新規登録</title>
</head>

<body>
  <h1>新規登録</h1>
  <div class="container mt-5">
    <div class="container-box">
      <form th:action="@{/transactions}" th:object="${transaction}" method="post">
        <div class="mb-3">
          <label class="form-label">日付</label>
          <input type="date" th:field="*{transactionDate}" class="form-control">
          <p class="error-message" th:if="${#fields.hasErrors('transactionDate')}" th:errors="*{transactionDate}">
          </p>
        </div>

        <div class="mb-3">
          <label class="form-label">種類</label>

          <select th:field="*{incomeExpenseCd}" class="form-control">
            <option value="">選択してください</option>

            <option th:each="incomeExpenseType : ${incomeExpenseTypes}" th:value="${incomeExpenseType.incomeExpenseCd}"
              th:text="${incomeExpenseType.name}">
            </option>
          </select>

          <p class="error-message" th:if="${#fields.hasErrors('incomeExpenseCd')}" th:errors="*{incomeExpenseCd}">
          </p>
        </div>
        <div class="mb-3 form-group">
          <label for="formGroupExampleInput" class="form-label">名前</label>
          <input type="text" th:field="*{name}">
          <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
        </div>

        <div class="mb-3 form-group">
          <label for="formGroupExampleInput" class="form-label">金額</label>
          <input type="number" th:field="*{amount}">
          <p th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></p>
        </div>

        <div class="mb-3">
          <label class="form-label">カテゴリ</label>

          <select th:field="*{categoryCd}" class="form-control">
            <option value="">選択してください</option>

            <option th:each="category : ${categories}" th:value="${category.categoryCd}" th:text="${category.categoryName}">
            </option>
          </select>

          <p class="error-message" th:if="${#fields.hasErrors('categoryCd')}" th:errors="*{categoryCd}">
          </p>
        </div>

        <div class="mb-3">
          <label class="form-label">支払方法</label>

          <select th:field="*{paymentmethodcd}" class="form-control">
            <option value="">選択してください</option>

            <option th:each="paymentMethod : ${paymentMethods}" th:value="${paymentMethod.paymentMethodCd}"
              th:text="${paymentMethod.name}">
            </option>
          </select>

          <p class="error-message" th:if="${#fields.hasErrors('paymentmethodcd')}" th:errors="*{paymentmethodcd}">
          </p>
        </div>

        <div class="mb-3 form-group">
          <label for="formGroupExampleInput" class="form-label">メモ</label>
          <input type="text" th:field="*{memo}">
        </div>

        <button type="submit" class="btn btn-primary">登録</button>
      </form>
    </div>
  </div>
  <p><a href="/transactions">一覧へ戻る</a></p>
</body>

</html>
